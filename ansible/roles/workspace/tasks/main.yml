---
- name: Create workspaces/main directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/workspaces/main"
    state: directory
    mode: "0755"

- name: Create workspace subdirectories
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/workspaces/main/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - memory
    - knowledge
    - knowledge/people
    - knowledge/organizations
    - knowledge/projects
    - knowledge/research
    - assets

- name: Create shared skills directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/skills"
    state: directory
    mode: "0755"

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/credentials"
    state: directory
    mode: "0700"

- name: Create attache config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.attache"
    state: directory
    mode: "0755"

- name: Create src directory for cloned repos
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/src"
    state: directory
    mode: "0755"
