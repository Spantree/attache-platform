---
- name: Create OpenClaw workspace directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/workspace"
    state: directory
    mode: "0755"

- name: Create workspace subdirectories
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/workspace/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - memory
    - skills
    - assets
    - context

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.openclaw/credentials"
    state: directory
    mode: "0700"

- name: Create src directory for cloned repos
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/src"
    state: directory
    mode: "0755"
